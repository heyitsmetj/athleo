<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Hero Visual Background (Abstract Kinetic Energy) -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[80%] h-[50%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[60%] h-[40%] bg-secondary/5 blur-[100px] rounded-full"></div>
<div class="absolute inset-0 pitch-gradient"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col px-8 pt-20 pb-12 max-w-md mx-auto w-full">
<!-- Brand Identity Section -->
<header class="mb-16">
<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="sports_soccer">sports_soccer</span>
<h1 class="font-headline font-black text-4xl tracking-tighter text-primary">ATHLEO</h1>
</div>
<div class="space-y-1">
<p class="font-headline text-2xl font-bold tracking-tight text-on-surface">Tactical Command</p>
<p class="text-on-surface-variant text-sm font-medium">Access your elite performance dashboard.</p>
</div>
</header>
<!-- Login Form -->
<form class="flex-1 flex flex-col gap-6">
<!-- Input: Identifier -->
<div class="space-y-2">
<label class="font-headline text-[10px] font-extrabold uppercase tracking-[0.2em] text-on-surface-variant ml-1">Manager ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="Enter credentials" type="text"/>
</div>
</div>
<!-- Input: Security Key -->
<div class="space-y-2">
<label class="font-headline text-[10px] font-extrabold uppercase tracking-[0.2em] text-on-surface-variant ml-1">Security Key</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-xs font-semibold text-primary/80 hover:text-primary transition-colors" href="#">Forgot Access Code?</a>
</div>
</div>
<!-- Action: Sign In -->
<div class="mt-4">
<button class="btn-glow w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-extrabold py-5 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transform active:scale-[0.98] transition-all" type="submit">
                    SIGN IN
                    <span class="material-symbols-outlined font-bold" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Alternative Entry -->
<div class="relative my-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest">
<span class="bg-surface px-4 text-outline font-medium">Or deploy via</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-3 px-4 rounded-xl bg-surface-container border border-outline-variant/10 hover:bg-surface-bright transition-colors" type="button">
<img alt="Google" class="w-5 h-5 grayscale opacity-70" data-alt="Google brand logo grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANTlJWxOXgugTHOnNPRL-RJduWikQr7WXVfxJeJZVHpcEQQJX035PgKQ7KncLk5Q8TcIAS60a7Y24bDZ30f4OkyML6WwA9N5tse5q-L_UWFUylpF6jDDVio53XeHIGKL7gEDzbXahwVFa6Bl-apTEQr6h1iNgEbj1ggw1vEXrkG-vieYYjan4zFSk9DGQ1FCt9jDy8ZWu-k0TBfVQ_Kj4uwWEqrcvaFPRvZDY9t4Przhyr2jc5cX7tG2VWQj4yby7yKNNEWf-7vZle"/>
</button>

<span class="material-symbols-outlined text-on-surface-variant" data-icon="fingerprint">fingerprint</span>
</button>

<footer class="mt-auto pt-12 text-center">
<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-high border border-outline-variant/10 mb-8">
<span class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_#ffd709]"></span>
<span class="font-headline text-[10px] font-bold uppercase tracking-widest text-secondary">Role-based access enabled</span>
</div>
<p class="text-on-surface-variant text-xs font-medium">
                New scout or analyst? <a class="text-primary font-bold hover:underline" href="#">Apply for Entry</a>
</p>
</footer>
