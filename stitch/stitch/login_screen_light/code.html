        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: linear-gradient(45deg, #6bff8f, #0abc56);

            backdrop-filter: blur(20px);

      min-height: max(884px, 100dvh);

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Anchor (Manual Filter: Suppress Nav Items for Login) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#060e20]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="sports_soccer">sports_soccer</span>
<span class="font-headline font-black text-[#22C55E] text-2xl tracking-tighter uppercase">ATHLEO</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12 relative">
<!-- Aesthetic Background Elements -->
<div class="absolute top-1/4 -right-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -left-20 w-64 h-64 bg-secondary/5 rounded-full blur-[100px]"></div>
<!-- Login Container -->
<div class="w-full max-w-md space-y-10 relative z-10">
<!-- Hero Header -->
<div class="space-y-2">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface">
                    Welcome <span class="text-primary">Back</span>
</h1>
<p class="text-on-surface-variant font-medium">Manage your squad with tactical precision.</p>
</div>
<!-- Form Fields -->
<div class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder-outline focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="coach@athleo.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder-outline focus:ring-2 focus:ring-primary transition-all duration-300" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<span class="material-symbols-outlined text-outline cursor-pointer hover:text-on-surface" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<div class="flex justify-end">
<a class="text-secondary font-semibold text-sm hover:underline underline-offset-4 decoration-2" href="#">Forgot Password?</a>
</div>
</div>
<!-- Primary Action -->
<div class="space-y-6 pt-4">
<button class="kinetic-gradient w-full py-4 rounded-xl font-headline font-bold text-on-primary-container text-lg shadow-[0_10px_30px_rgba(107,255,143,0.2)] active:scale-95 transition-all duration-150 uppercase tracking-wide">
                    SIGN IN
                </button>
<div class="flex flex-col items-center gap-4">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container rounded-full">
<span class="material-symbols-outlined text-secondary text-base" data-icon="verified_user">verified_user</span>
<span class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">Role-based access enabled</span>
</div>
</div>
</div>
<!-- Secondary Action -->
<div class="text-center pt-8">
<p class="text-on-surface-variant text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold ml-1 hover:underline" href="#">Request Access</a>
</p>
</div>
</div>
</main>
<!-- Visual Footer Accent -->
<div class="w-full h-1 kinetic-gradient opacity-20"></div>
<!-- Background Decorative Image (Bento style hint) -->
<div class="fixed bottom-0 right-0 w-1/2 h-1/2 -z-10 opacity-10 pointer-events-none overflow-hidden">
